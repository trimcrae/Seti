name: xp-run

# Blind technosignature search of Gaia DR3 XP low-resolution spectra: flag sources
# whose spectral SHAPE no colour-matched stellar population reproduces (partial
# Dyson reprocessing deficit, or an artificial spectral feature), then funnel out
# quasars/galaxies/white dwarfs/known variables. Runs on a GitHub runner with
# Gaia-archive access.

on:
  workflow_dispatch:
    inputs:
      ra: { description: "Cone RA (deg)", required: false, default: "180" }
      dec: { description: "Cone Dec (deg)", required: false, default: "30" }
      radius_deg: { description: "Cone radius (deg)", required: false, default: "1.0" }
      g_max: { description: "Faint G limit", required: false, default: "17.5" }
      limit: { description: "Max XP sources", required: false, default: "20000" }

permissions:
  contents: write

jobs:
  xp:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.ref_name }}" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install
        run: |
          python -m pip install --upgrade pip >/dev/null
          pip install -e ".[dev]" >/dev/null
          python -c "import astroquery, numpy, pandas; print('imports OK')"
      - name: Run XP anomaly search
        run: |
          python -m seti.cli xp-run --ra ${{ github.event.inputs.ra }} --dec ${{ github.event.inputs.dec }} \
            --radius-deg ${{ github.event.inputs.radius_deg }} --g-max ${{ github.event.inputs.g_max }} \
            --limit ${{ github.event.inputs.limit }}
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/xp/ || true
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "xp-run: Gaia XP anomaly search (cone ${{ github.event.inputs.ra }}, ${{ github.event.inputs.dec }})"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || \
              { git pull --rebase --autostash origin ${{ github.ref_name }}; git push origin HEAD:${{ github.ref_name }}; }
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: xp-outputs, path: results/xp/, if-no-files-found: warn }
