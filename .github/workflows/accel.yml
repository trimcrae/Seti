name: accel-run

# Astrometric-acceleration technosignature search: Gaia DR3 stars whose sky path
# is accelerating (nss_acceleration_astro) -- the signature of an unseen massive
# companion (how Gaia found the nearest dormant black holes). A NEW physical axis
# beyond the photometric/spectral channels. Runs on the GitHub runner (Gaia TAP).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max acceleration-solution stars to pull (by significance)"
        required: false
        default: "8000"
      plx_min:
        description: "Minimum parallax mas (2 = within 500 pc)"
        required: false
        default: "2.0"
      sig_min:
        description: "Minimum Gaia acceleration significance"
        required: false
        default: "20.0"

permissions:
  contents: write

jobs:
  accel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "import numpy,pandas,astroquery; print('imports OK')"
      - name: Run acceleration search + literature cross-match
        run: |
          python -m seti.cli accel-run --limit ${{ github.event.inputs.limit }} \
            --plx-min ${{ github.event.inputs.plx_min }} \
            --sig-min ${{ github.event.inputs.sig_min }}
          echo "=== literature cross-match summary ==="
          cat results/accel/summary.json | python -c "import json,sys; d=json.load(sys.stdin); print('in_literature:', d.get('n_in_literature'), 'novel_absent:', d.get('n_novel_absent')); print('novel_source_ids:', d.get('novel_source_ids'))" || true
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/accel/ || true
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "accel-run: Gaia astrometric-acceleration dark-companion search"
            git checkout -- . 2>/dev/null || true
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || \
              { git checkout -- . 2>/dev/null || true; \
                git pull --rebase --autostash origin ${{ github.ref_name }}; \
                git push origin HEAD:${{ github.ref_name }}; }
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accel-outputs
          path: results/accel/
          if-no-files-found: warn
