name: spectra-confirm

# Cross-instrument confirmation of the laser-line shortlist: for each top
# candidate, look for an independent spectrum of the same star in another survey
# (SDSS / BOSS / DESI-EDR) via SPARCL and test whether the narrow line reproduces.
# A line present in two independent spectrographs is real; a DESI-only line is an
# instrument artifact. Runner-side (SPARCL egress); commits results/spectra/.

on:
  workflow_dispatch:
    inputs:
      top:
        description: "Number of top candidates to cross-check"
        required: false
        default: "40"

permissions:
  contents: write

jobs:
  confirm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,spectra]"
          pip install --upgrade --force-reinstall --no-cache-dir \
            "numpy>=2.0" pandas pyarrow scipy
          python -c "import sparcl.client; print('sparclclient OK')"
      - name: Triage (offline observed-frame re-screen of committed candidates)
        run: python -m seti.cli spectra-triage
      - name: Cross-confirm
        run: python -m seti.cli spectra-confirm --top ${{ github.event.inputs.top }}
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/spectra/cross_confirm.csv results/spectra_triage || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "spectra-confirm: cross-instrument laser-line confirmation"
            git checkout -- . 2>/dev/null || true
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || \
              { git checkout -- . 2>/dev/null || true; \
                git pull --rebase --autostash origin ${{ github.ref_name }}; \
                git push origin HEAD:${{ github.ref_name }}; }
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cross-confirm
          path: results/spectra/cross_confirm.csv
          if-no-files-found: warn
