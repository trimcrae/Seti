name: panspermia-targets

# Directed-travel destination ranking for a TECHNOLOGICAL disperser from K2-18.
# Reachability is trivial at any cruise speed, so the filter is destination
# quality. This job layers the NASA Exoplanet Archive onto the reachable-neighbour
# list to flag known planet hosts and -- the sharp signal -- HYCEAN-analog worlds
# (sub-Neptunes in the hycean habitable zone around cool stars), the destinations a
# K2-18-evolved organism would actually find habitable. Reads the committed
# encounter table; needs egress (Exoplanet Archive TAP), so it runs on the runner.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Habitability prior: hycean or classical"
        required: false
        default: "hycean"
      max_pc:
        description: "Host-distance limit for the Exoplanet-Archive pull (pc)"
        required: false
        default: "90.0"

permissions:
  contents: write

jobs:
  targets:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "import numpy,pandas,requests; print('imports OK')"
      - name: Rank destinations + Exoplanet-Archive cross-match
        run: |
          python -m seti.cli panspermia-targets \
            --target ${{ github.event.inputs.target }} \
            --max-pc ${{ github.event.inputs.max_pc }} \
            --crossmatch
          echo "=== targets summary ==="
          cat results/panspermia/targets_summary.json || true
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/panspermia/ || true
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "panspermia-targets: directed-travel destination ranking + exohost cross-match"
            git checkout -- . 2>/dev/null || true
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || \
              { git checkout -- . 2>/dev/null || true; \
                git pull --rebase --autostash origin ${{ github.ref_name }}; \
                git push origin HEAD:${{ github.ref_name }}; }
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: panspermia-targets-outputs
          path: results/panspermia/
          if-no-files-found: warn
