name: science-run

# Run the EMPIRICAL search on the GitHub-hosted runner, which has unrestricted
# outbound network to the Gaia/VizieR/CDS Virtual Observatory services (the
# interactive sandbox is egress-restricted). Results are committed back to the
# branch so they can be pulled into the working tree and folded into the paper.

on:
  workflow_dispatch:
    inputs:
      max_dist_pc:
        description: "Distance cut for the WD parent sample (pc)"
        required: false
        default: "100"
      limit:
        description: "Optional cap on number of WDs (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  science:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/make_bergeron_asset.py
      - name: Run empirical acquisition + analysis
        run: |
          ARGS="--max-dist-pc ${{ github.event.inputs.max_dist_pc }}"
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          echo "seti science-run $ARGS"
          python -m seti.cli science-run $ARGS
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/science/ || true
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "science-run: empirical results (dist=${{ github.event.inputs.max_dist_pc }} pc)

            Generated on a GitHub-hosted runner with archive network access."
            # The run leaves other tracked files dirty (regenerated assets); discard
            # them so the rebase onto concurrently-pushed commits is not blocked.
            git checkout -- . 2>/dev/null || true
            # Rebase onto any commits pushed since checkout, then push (retry once).
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }} || \
              { git checkout -- . 2>/dev/null || true; \
                git pull --rebase --autostash origin ${{ github.ref_name }}; \
                git push origin HEAD:${{ github.ref_name }}; }
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: science-outputs
          path: |
            results/science/
            data/processed/analysis_ready.parquet
